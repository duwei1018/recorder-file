paths:
  # 录音文件输入目录
  input_dir: "/Users/duwei/Desktop/recorder-file"
  # 主输出目录（NAS）
  output_dir: "/Users/duwei/Library/CloudStorage/SynologyDrive-duwei/行业研究/recorder-file output"
  # 镜像输出目录（桌面）
  output_mirror: "/Users/duwei/Desktop/recorder-file output"
  # 知识库存储位置（阶段二激活）
  knowledge_dir: "/Users/duwei/recorder-file/knowledge_db"

whisper:
  model: medium          # tiny / base / small / medium / large-v3
  language: zh
  fp16: false            # CPU 推理设 false

ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  model: "qwen3:14b"  # 按 ollama list 实际填写
  timeout: 300
  max_retries: 3
  chunk_chars: 3000

cache_file: "/Users/duwei/recorder-file/processed_cache.json"

audio_extensions:
  - .mp3
  - .wav
  - .m4a
  - .mp4
  - .flac
  - .ogg
  - .wma
  - .aac
